# =============================================================================
#  CTB UBS — GitLab CI/CD Pipeline
#  Project  : CTB Integracao API — .NET Windows Application
#  Owner    : Sagarika
#
#  Build flow:
#    1. .NET build  →  dotnet (MSBuild) compiles the Windows app
#    2. Package     →  ZIP the bin/Release output (+ MSI / EXE / config)
#    3. Upload      →  Maven `deploy:deploy-file` pushes ZIP to Nexus
#
#  ⚠️  Placeholders intentional. Replace inside enterprise environment only:
#      <COMPANY_REGISTRY>     → internal container registry hostname
#      <NEXUS_WRITE_URL>      → internal Nexus write endpoint
#      <NEXUS_GROUP_ID>       → e.g. com.ubs.ctb.deploy.application
#      <NEXUS_ARTIFACT_ID>    → e.g. CTB_integracao_dotnet_app
#      <CI_TEMPLATE_PROJECT>  → shared CI templates project path
#      <VAULT_URL>            → internal HashiCorp Vault server URL
#      <VAULT_NAMESPACE>      → namespace assigned to your team
#      <VAULT_AUTH_ROLE>      → vault auth role for this CI project
#      <CRED_PATH>            → vault path holding Nexus upload credentials
# =============================================================================

# -----------------------------------------------------------------------------
#  Shared CI templates (id_tokens, fetch-eva-secrets, etc.)
# -----------------------------------------------------------------------------
include:
  - project: '<CI_TEMPLATE_PROJECT>'
    file:
      - 'gitlab-pipeline/.ci_id_tokens.yml'

# -----------------------------------------------------------------------------
#  Variables
# -----------------------------------------------------------------------------
variables:
  # .NET
  DOTNET_VERSION: '8.0'
  BUILD_CONFIGURATION: 'Release'
  SOLUTION_FILE: 'CTB.Integracao.API.sln'

  # Maven (used only for Nexus upload)
  MAVEN_CLI_OPTS: "-s settings.xml --batch-mode"
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"

  # Nexus
  nexus_write_url: '<NEXUS_WRITE_URL>/repository/'
  nexus_group_id: '<NEXUS_GROUP_ID>'                                  # com.ubs.ctb.deploy.application
  nexus_artifact_id: 'CTB_integracao_dotnet_app'
  artifact_name: 'CTB_integracao_dotnet_app-1.0.0.${CI_PIPELINE_IID}.zip'

  # Vault / EVA secrets
  CRED_PATH: '<CRED_PATH>'
  VAULT_SERVER_URL: '<VAULT_URL>'
  VAULT_NAMESPACE: '<VAULT_NAMESPACE>'
  VAULT_AUTH_ROLE: '<VAULT_AUTH_ROLE>'
  VAULT_ID_TOKEN_AUD: '<VAULT_URL>'

# -----------------------------------------------------------------------------
#  Hidden jobs — secret retrieval (extended by upload jobs)
# -----------------------------------------------------------------------------
.fetch-eva-secrets:
  id_tokens:
    VAULT_ID_TOKEN:
      aud: ${VAULT_ID_TOKEN_AUD}
    CI_JOB_JWT:
      aud: ${VAULT_ID_TOKEN_AUD}

.get-deploy-eva-credentials:
  extends: .fetch-eva-secrets
  before_script:
    - echo "🔐 Fetching Nexus upload credentials from Vault"
    - export password=$(vault kv get -field=password ${CRED_PATH})
    - export username=$(vault kv get -field=username ${CRED_PATH})

# -----------------------------------------------------------------------------
#  Stages
# -----------------------------------------------------------------------------
stages:
  - validate
  - build
  - test
  - Zippingpackage
  - nexusupload
  - notify

# =============================================================================
#  STAGE 1: VALIDATE — restore + format check (.NET)
# =============================================================================
validate_dotnet:
  image: <COMPANY_REGISTRY>/dotnet/sdk:8.0
  stage: validate
  script:
    - echo "🔍 Restoring NuGet packages from Nexus"
    - dotnet restore $SOLUTION_FILE --configfile nuget.config
    - echo "🔍 Verifying code format"
    - dotnet format $SOLUTION_FILE --verify-no-changes

# =============================================================================
#  STAGE 2: BUILD — dotnet build (MSBuild) for the Windows application
# =============================================================================
build_dotnet:
  image: <COMPANY_REGISTRY>/dotnet/sdk:8.0
  stage: build
  script:
    - echo "🔨 Building .NET Windows application"
    - dotnet build $SOLUTION_FILE --configuration $BUILD_CONFIGURATION --no-restore
    - echo "📦 Publishing app (self-contained)"
    - dotnet publish $SOLUTION_FILE --configuration $BUILD_CONFIGURATION --output ./publish --no-build
  artifacts:
    paths:
      - publish/
      - "**/bin/$BUILD_CONFIGURATION/"
    expire_in: 1 day

# =============================================================================
#  STAGE 3: TEST — unit tests (.NET)
# =============================================================================
unit_tests:
  image: <COMPANY_REGISTRY>/dotnet/sdk:8.0
  stage: test
  script:
    - echo "🧪 Running .NET unit tests"
    - dotnet test $SOLUTION_FILE --configuration $BUILD_CONFIGURATION --no-build
              --logger "junit;LogFilePath=test-results.xml"
              --collect:"XPlat Code Coverage"
  artifacts:
    when: always
    reports:
      junit: '**/test-results.xml'

# =============================================================================
#  STAGE 4: ZIPPINGPACKAGE — package .NET app as ZIP
# =============================================================================
Zippingpackage:
  image: <COMPANY_REGISTRY>/ubs/ari/alpine-curl-zip:latest
  stage: Zippingpackage
  needs:
    - build_dotnet
  script:
    - mkdir -p CTB_integracao_dotnet_app
    - mkdir -p CTB_integracao_dotnet_app/bin
    - mkdir -p CTB_integracao_dotnet_app/config
    - mkdir -p CTB_integracao_dotnet_app/scripts
    # Copy compiled .NET output
    - cp -r publish/* CTB_integracao_dotnet_app/bin/ || true
    # Copy MSI installer if present
    - cp installer/*.msi CTB_integracao_dotnet_app/bin/ || true
    # Copy app config + deploy scripts
    - cp -r config/* CTB_integracao_dotnet_app/config/ || true
    - cp -r scripts/* CTB_integracao_dotnet_app/scripts/ || true
    # Optional: include PowerShell deployment helper
    - cp windows_service.ps1 CTB_integracao_dotnet_app/scripts/ || true
    - echo "📦 Zipping .NET application package"
    - cd CTB_integracao_dotnet_app
    - zip -r $CI_PROJECT_DIR/$artifact_name *
    - echo "✅ Created $artifact_name"
  artifacts:
    paths:
      - $artifact_name
    expire_in: 7 days

# =============================================================================
#  STAGE 5: NEXUS UPLOAD — push ZIP via Maven deploy:deploy-file
#  (Only step where Maven is used — purely as the upload mechanism)
# =============================================================================
.nexusupload:
  image: <COMPANY_REGISTRY>/maven:3.6.3-jdk-8
  stage: nexusupload
  needs:
    - Zippingpackage
  extends: .get-deploy-eva-credentials
  script:
    - echo "⬆️  Uploading .NET ZIP to Nexus → ${nexus_repo}"
    - >
      mvn deploy:deploy-file
      -DgroupId=$nexus_group_id
      -DartifactId=$nexus_artifact_id
      -Dversion=$nexus_artifact_version
      -Dpackaging=zip
      -Dfile=$artifact_name
      -DrepositoryId=$nexus_repo
      -Durl=${nexus_write_url}${nexus_repo}/
      -s settings.xml
      -Dpassword=$password

# Snapshot upload — develop / feature branch (manual gate)
Nexus_Snapshot_Upload:
  extends: .nexusupload
  variables:
    nexus_repo: 'deploy-shared-071-snapshot'
    nexus_artifact_version: '1.0.0.${CI_PIPELINE_IID}-SNAPSHOT'
  only:
    refs:
      - AAF_ctb_integracao_api
      - develop
  when: manual

# Release upload — main branch (manual gate)
Nexus_Release_Upload:
  extends: .nexusupload
  variables:
    nexus_repo: 'deploy-shared-071-release'
    nexus_artifact_version: '1.0.0.${CI_PIPELINE_IID}'
  only:
    refs:
      - main
      - master
  when: manual

# =============================================================================
#  STAGE 6: NOTIFY — MERS event
# =============================================================================
notify_mers:
  stage: notify
  script:
    - echo "📣 Notifying MERS"
    - >
      curl -X POST <MERS_URL>/events
      -H "Content-Type: application/json"
      -d "{
        \"source\":\"ctb-ubs-pipeline\",
        \"build\":\"$CI_PIPELINE_IID\",
        \"artifact\":\"$artifact_name\",
        \"status\":\"success\"
      }"
  when: on_success
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
