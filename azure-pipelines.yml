# =============================================================================
#  CTB UBS — Azure DevOps Pipeline
#  Project : CTB (Swiss Bank Project) — Server Migration
#  Owner   : Sagarika (Technical Lead)
# =============================================================================

name: 'CTB-UBS-$(SourceBranchName)-$(Date:yyyyMMdd)$(Rev:.r)'

trigger:
  branches:
    include:
      - main
      - develop
      - release/*
  paths:
    exclude:
      - docs/*
      - README.md
      - CHANGELOG.md

pr:
  branches:
    include:
      - main
      - develop

# -----------------------------------------------------------------------------
#  Variables
# -----------------------------------------------------------------------------
variables:
  - group: ctb-ubs-secrets               # Nexus creds, Agnes tokens, SSL keys
  - name: solution
    value: '**/*.sln'
  - name: buildPlatform
    value: 'Any CPU'
  - name: buildConfiguration
    value: 'Release'
  - name: nexusFeed
    value: 'https://nexus.internal/repository/ctb-ubs-releases/'
  - name: artifactName
    value: 'ctb-ubs-app'
  - name: dotNetVersion
    value: '8.0.x'

# -----------------------------------------------------------------------------
#  Pool — self-hosted Windows agent (corporate)
# -----------------------------------------------------------------------------
pool:
  name: 'CTB-Windows-Agents'
  demands:
    - msbuild
    - visualstudio
    - dotnet -equals 8.0

# -----------------------------------------------------------------------------
#  Stages
# -----------------------------------------------------------------------------
stages:

  # ===========================================================================
  # STAGE 1: VALIDATE — lint, security scan, license check
  # ===========================================================================
  - stage: Validate
    displayName: '🔍 Validate & Scan'
    jobs:
      - job: lint_scan
        displayName: 'Lint + SAST'
        steps:
          - checkout: self
            fetchDepth: 0

          - task: UseDotNet@2
            displayName: 'Install .NET SDK'
            inputs:
              packageType: 'sdk'
              version: $(dotNetVersion)

          - script: dotnet format --verify-no-changes
            displayName: 'Code formatting check'

          - task: SonarQubePrepare@5
            displayName: 'Prepare SonarQube analysis'
            inputs:
              SonarQube: 'CTB-SonarQube'
              scannerMode: 'MSBuild'
              projectKey: 'ctb-ubs'

  # ===========================================================================
  # STAGE 2: BUILD — restore, compile, unit test
  # ===========================================================================
  - stage: Build
    displayName: '🔨 Build & Test'
    dependsOn: Validate
    condition: succeeded()
    jobs:
      - job: build
        displayName: 'Compile + Unit Tests'
        steps:
          - checkout: self

          - task: NuGetAuthenticate@1
            displayName: 'Authenticate to Nexus feed'

          - task: DotNetCoreCLI@2
            displayName: 'Restore from Nexus'
            inputs:
              command: 'restore'
              projects: $(solution)
              feedsToUse: 'config'
              nugetConfigPath: 'nuget.config'

          - task: DotNetCoreCLI@2
            displayName: 'Build solution'
            inputs:
              command: 'build'
              projects: $(solution)
              arguments: '--configuration $(buildConfiguration) --no-restore'

          - task: DotNetCoreCLI@2
            displayName: 'Run unit tests'
            inputs:
              command: 'test'
              projects: '**/*Tests.csproj'
              arguments: '--configuration $(buildConfiguration) --collect "Code coverage"'

          - task: SonarQubeAnalyze@5
            displayName: 'Run SonarQube analysis'

          - task: SonarQubePublish@5
            displayName: 'Publish SonarQube results'
            inputs:
              pollingTimeoutSec: '300'

  # ===========================================================================
  # STAGE 3: PACKAGE & PUBLISH — push to Nexus
  # ===========================================================================
  - stage: Publish
    displayName: '📦 Package & Publish to Nexus'
    dependsOn: Build
    condition: and(succeeded(), in(variables['Build.SourceBranchName'], 'main', 'develop'))
    jobs:
      - job: publish
        displayName: 'Publish to Nexus'
        steps:
          - task: DotNetCoreCLI@2
            displayName: 'Publish app'
            inputs:
              command: 'publish'
              projects: '**/*.csproj'
              arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory) --no-build'
              publishWebProjects: false
              zipAfterPublish: true

          - task: DotNetCoreCLI@2
            displayName: 'Pack NuGet package'
            inputs:
              command: 'pack'
              packagesToPack: '**/*.csproj'
              versioningScheme: 'byBuildNumber'

          - task: NuGetCommand@2
            displayName: 'Push to Nexus'
            inputs:
              command: 'push'
              packagesToPush: '$(Build.ArtifactStagingDirectory)/**/*.nupkg'
              nuGetFeedType: 'external'
              publishFeedCredentials: 'Nexus-CTB-UBS'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Azure artifact'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)'
              ArtifactName: $(artifactName)

  # ===========================================================================
  # STAGE 4: DEPLOY DEV1 — Puppet provision + ADT register
  # ===========================================================================
  - stage: Deploy_Dev1
    displayName: '🚀 Deploy → Dev1'
    dependsOn: Publish
    condition: and(succeeded(), eq(variables['Build.SourceBranchName'], 'develop'))
    jobs:
      - deployment: dev1_deploy
        displayName: 'Deploy to Dev1'
        environment:
          name: 'Dev1'
          resourceType: VirtualMachine
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: $(artifactName)

                - task: PowerShell@2
                  displayName: 'Apply Puppet manifest'
                  inputs:
                    targetType: 'inline'
                    script: |
                      Write-Host "🔧 Applying Puppet config to dev1.ctb.internal"
                      puppet agent --test --server puppet.ctb.internal

                - task: PowerShell@2
                  displayName: 'Install MSI on Dev1'
                  inputs:
                    targetType: 'inline'
                    script: |
                      Write-Host "📥 Installing CTB-UBS on Dev1"
                      Start-Process msiexec.exe -ArgumentList "/i $(Pipeline.Workspace)\$(artifactName)\ctb-ubs.msi /quiet /norestart" -Wait

                - task: PowerShell@2
                  displayName: 'Register with ADT'
                  inputs:
                    targetType: 'inline'
                    script: |
                      Write-Host "📊 Registering deployment with ADT"
                      Invoke-RestMethod -Uri "https://adt.internal/api/deployments" -Method Post -Body @{
                        application = "ctb-ubs"
                        version     = "$(Build.BuildNumber)"
                        environment = "Dev1"
                      } -Headers @{ Authorization = "Bearer $(ADT_TOKEN)" }

                - task: PowerShell@2
                  displayName: 'Smoke test'
                  inputs:
                    targetType: 'inline'
                    script: |
                      $health = Invoke-RestMethod -Uri "https://api.dev1.ctb.internal/health" -SkipCertificateCheck
                      if ($health.status -ne 'healthy') { exit 1 }
                      Write-Host "✅ Dev1 deployment healthy"

  # ===========================================================================
  # STAGE 5: NOTIFY — MERS event + Slack/Teams
  # ===========================================================================
  - stage: Notify
    displayName: '📣 Notify MERS'
    dependsOn: Deploy_Dev1
    condition: always()
    jobs:
      - job: notify
        steps:
          - task: PowerShell@2
            displayName: 'Send MERS event'
            inputs:
              targetType: 'inline'
              script: |
                $payload = @{
                  source      = "ctb-ubs-pipeline"
                  build       = "$(Build.BuildNumber)"
                  environment = "Dev1"
                  status      = "$(Agent.JobStatus)"
                } | ConvertTo-Json
                Invoke-RestMethod -Uri "https://mers.internal/events" -Method Post -Body $payload -ContentType "application/json"
